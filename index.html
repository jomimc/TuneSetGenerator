<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tune Set Picker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tune Set Picker</h1>

  <div id="tunebook-section">
    <label for="memberInput">thesession.org member #:</label>
    <input type="number" id="memberInput" min="1" placeholder="e.g. 1">
    <button id="loadBtn">Load Tunebook</button>
    <button id="reloadBtn" style="display:none">Reload</button>
    <div id="loadProgress"></div>
    <div id="tunebookInfo"></div>
  </div>

  <div id="picker-section" style="display:none">
    <label for="rhythmSelect"><b>Rhythm:</b></label>
    <select id="rhythmSelect">
      <option value="random">Random</option>
    </select>
    <button id="pickBtn">Pick</button>
    <button id="saveBtn" disabled>Save Set</button>
  </div>

  <div id="set-display"></div>

  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <script src="app.js"></script>
</body>
</html>
