<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tune Set Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tune Set Generator</h1>

  <!-- Section 1: Load tunebooks (collapsible, collapsed by default) -->
  <div id="tunebook-section" class="collapsible-section collapsed">
    <button type="button" class="section-header" id="tunebookHeaderBtn">
      <span class="section-title">Load tunebooks</span>
      <span class="section-toggle">▸</span>
    </button>
    <div class="section-body">
      <div id="members-list"></div>
      <button id="addMemberBtn" type="button">+ Playing with a friend? Add a member to see shared tunes</button>
    </div>
    <div id="loadProgress"></div>
    <div id="tunebookInfo"></div>
  </div>

  <!-- Section 2: Settings (collapsible, collapsed by default) -->
  <div id="settings-section" class="collapsible-section collapsed">
    <button type="button" class="section-header" id="settingsHeaderBtn">
      <span class="section-title">Settings</span>
      <span class="section-toggle">▸</span>
    </button>
    <div class="section-body">
      <div class="control-row" id="sourceRow">
        <label><b>Source:</b></label>
        <div class="source-tier">
          <div class="button-group" id="sourceButtonsTier1">
            <button type="button" data-source="random">My tunebook</button>
            <button type="button" data-source="mysets">My sets</button>
          </div>
          <span id="sourceUnavailableMsg" class="source-unavailable" style="display:none">Load a tunebook to use these features</span>
        </div>
        <div class="source-tier">
          <div class="button-group" id="sourceButtonsTier2">
            <button type="button" data-source="usersets">Popular sets</button>
            <button type="button" data-source="recordings">Recorded sets</button>
            <button type="button" data-source="poptunes" class="active">Popular tunes</button>
          </div>
        </div>
      </div>
      <div class="control-row" id="sizeRow">
        <label><b>Size:</b></label>
        <div class="button-group" id="sizeButtons">
          <button type="button" id="randomSizeBtn" data-size="random" style="display:none">Random</button>
          <button type="button" data-size="2">2</button>
          <button type="button" data-size="3" class="active">3</button>
          <button type="button" data-size="4">4</button>
          <button type="button" data-size="5">5</button>
        </div>
      </div>
      <div class="control-row" id="keyRow">
        <label><b>Keys:</b></label>
        <div class="button-group" id="keyButtons">
          <button type="button" data-key="any" class="active">Any</button>
          <button type="button" data-key="same">All Same</button>
          <button type="button" data-key="different">All Different</button>
        </div>
      </div>
      <div class="control-row" id="popularityRow" style="display:none">
        <label><b>Popularity:</b></label>
        <div class="button-group" id="popularityButtons"></div>
      </div>
      <div class="control-row" id="knownRow" style="display:none">
        <label class="toggle-label"><input type="checkbox" id="onlyKnownToggle" checked> Only <span id="knownNoun">sets I fully know</span></label>
      </div>
    </div>
  </div>

  <!-- Section 3: Generate (Rhythm + Pick + actions) -->
  <div id="generate-section">
    <div class="control-row">
      <label for="rhythmSelect"><b>Rhythm:</b></label>
      <select id="rhythmSelect">
        <option value="random">Random</option>
      </select>
    </div>
    <div class="generate-row">
      <button id="pickBtn" class="pick-btn">Pick</button>
      <div id="set-actions">
        <button id="saveBtn" disabled>Save Set</button>
        <button id="chooseSavedBtn" disabled>Choose from Saved Sets</button>
        <button id="downloadSavedBtn" disabled>Download Saved Sets</button>
      </div>
    </div>
  </div>

  <!-- Section 4: The set (unchanged) -->
  <div id="set-display"></div>

  <div id="saved-sets-modal">
    <div id="saved-sets-modal-content">
      <h3>Saved Sets</h3>
      <div id="saved-sets-list"></div>
      <button id="closeSavedModal">Close</button>
    </div>
  </div>

  <div id="location-modal">
    <div id="location-modal-content">
      <h3>Find a member</h3>
      <p class="modal-hint">Search thesession.org by name or location, then pick yourself (or a friend) to load that tunebook.</p>
      <div class="loc-search-row">
        <input id="memberNameInput" type="text" placeholder="Name on thesession.org, e.g. Jeremy">
        <button id="memberNameSearchBtn" type="button">Search by name</button>
      </div>
      <div class="loc-search-row">
        <input id="locationPlaceInput" type="text" placeholder="Town or place, e.g. Doolin">
        <button id="locationSearchBtn" type="button">Search by place</button>
        <button id="locationGeoBtn" type="button" title="Use your current location">Use my location</button>
      </div>
      <input id="locationNameFilter" type="text" placeholder="Filter these results by name…" style="display:none">
      <div id="locationStatus"></div>
      <div id="location-results"></div>
      <button id="locationMore" type="button" style="display:none">Load more</button>
      <button id="closeLocationModal" type="button">Close</button>
      <p class="modal-credit">Place search &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap</a> contributors.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
