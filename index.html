<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tune Set Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tune Set Generator</h1>

  <div id="tunebook-section">
    <div id="members-list"></div>
    <button id="addMemberBtn" type="button">+ Playing with a friend? Add a member</button>
    <div id="loadProgress"></div>
    <div id="tunebookInfo"></div>
  </div>

  <div id="picker-section" style="display:none">
    <div class="control-row">
      <label for="rhythmSelect"><b>Rhythm:</b></label>
      <select id="rhythmSelect">
        <option value="random">Random</option>
      </select>
      <button id="pickBtn">Pick</button>
      <label class="toggle-label"><input type="checkbox" id="fullTuneToggle"> Full tunes</label>
    </div>
    <div class="control-row">
      <label><b>Size:</b></label>
      <div class="button-group" id="sizeButtons">
        <button type="button" data-size="2">2</button>
        <button type="button" data-size="3" class="active">3</button>
        <button type="button" data-size="4">4</button>
        <button type="button" data-size="5">5</button>
      </div>
    </div>
    <div class="control-row">
      <label><b>Keys:</b></label>
      <div class="button-group" id="keyButtons">
        <button type="button" data-key="any" class="active">Any</button>
        <button type="button" data-key="same">All Same</button>
        <button type="button" data-key="different">All Different</button>
      </div>
    </div>
    <div id="set-actions">
      <button id="saveBtn" disabled>Save Set</button>
      <button id="playedSetBtn" disabled>Played Set (Don't Save)</button>
      <button id="chooseSavedBtn" disabled>Choose from Saved Sets</button>
      <button id="downloadSavedBtn" disabled>Download Saved Sets</button>
    </div>
  </div>

  <div id="set-display"></div>

  <div id="saved-sets-modal">
    <div id="saved-sets-modal-content">
      <h3>Saved Sets</h3>
      <div id="saved-sets-list"></div>
      <button id="closeSavedModal">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
